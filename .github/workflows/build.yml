name: Build eMeX

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional tag to publish a Release after successful builds, for example v1.1.0"
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: emex-windows-x64
            artifact_path: upload-artifact/emex-windows-x64
          - os: macos-15-intel
            artifact_name: emex-macos-intel
            artifact_path: upload-artifact/emex-macos-intel
          - os: macos-latest
            artifact_name: emex-macos-arm64
            artifact_path: upload-artifact/emex-macos-arm64
          - os: ubuntu-latest
            artifact_name: emex-linux-x64
            artifact_path: upload-artifact/emex-linux-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install Linux Qt dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libopengl0 \
            libxcb-cursor0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-randr0 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow certifi

      - name: Prepare app icons
        run: python scripts/prepare_icons.py

      - name: Build application
        env:
          QT_QPA_PLATFORM: offscreen
        run: pyinstaller build.spec --noconfirm --clean

      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "${{ matrix.artifact_path }}" | Out-Null
          Compress-Archive -Path "dist\eMeX" `
                           -DestinationPath "${{ matrix.artifact_path }}/${{ matrix.artifact_name }}.zip" `
                           -CompressionLevel Optimal -Force

      - name: Package macOS release
        if: runner.os == 'macOS'
        run: |
          mkdir -p "${{ matrix.artifact_path }}"
          tar -czf "${{ matrix.artifact_path }}/${{ matrix.artifact_name }}.tar.gz" \
              -C dist eMeX.app

      - name: Package Linux release
        if: runner.os == 'Linux'
        run: |
          mkdir -p "${{ matrix.artifact_path }}"
          install -m 755 scripts/install-linux-desktop.sh dist/eMeX/install-linux-desktop.sh
          tar -czf "${{ matrix.artifact_path }}/${{ matrix.artifact_name }}.tar.gz" \
              -C dist eMeX

      - name: Verify Windows archive structure
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zipPath = "${{ matrix.artifact_path }}/${{ matrix.artifact_name }}.zip"
          $zip = [System.IO.Compression.ZipFile]::OpenRead($zipPath)
          try {
            $entries = $zip.Entries | ForEach-Object FullName
            if (-not ($entries -contains "eMeX/eMeX.exe")) {
              throw "Windows zip is missing eMeX/eMeX.exe"
            }
            if (-not ($entries | Where-Object { $_ -match '(^|/|\\)eMeX(/|\\)_internal(/|\\)docs(/|\\)assets(/|\\)icon_eMeX\.png$' })) {
              throw "Windows zip is missing icon_eMeX.png"
            }
            if (-not ($entries | Where-Object { $_ -match '(^|/|\\)QtWebEngineProcess\.exe$' })) {
              throw "Windows zip is missing QtWebEngineProcess.exe"
            }
            Write-Host "Windows zip OK ($($entries.Count) entries)"
          } finally {
            $zip.Dispose()
          }

      - name: Verify macOS / Linux archive structure
        if: runner.os != 'Windows'
        run: |
          ARCHIVE="${{ matrix.artifact_path }}/${{ matrix.artifact_name }}.tar.gz"
          if [[ "${{ matrix.artifact_name }}" == emex-macos-* ]]; then
            tar -tzf "$ARCHIVE" | grep -q '^eMeX.app/Contents/MacOS/eMeX$' || {
              echo "macOS archive is missing eMeX.app/Contents/MacOS/eMeX" >&2
              exit 1
            }
            tar -tzf "$ARCHIVE" | grep -q 'QtWebEngineProcess' || {
              echo "macOS archive is missing QtWebEngineProcess" >&2
              exit 1
            }
          else
            tar -tzf "$ARCHIVE" | grep -q '^eMeX/eMeX$' || {
              echo "Linux archive is missing eMeX/eMeX" >&2
              exit 1
            }
            tar -tzf "$ARCHIVE" | grep -q '^eMeX/_internal/docs/assets/icon_eMeX.png$' || {
              echo "Linux archive is missing icon_eMeX.png" >&2
              exit 1
            }
            tar -tzf "$ARCHIVE" | grep -q '^eMeX/install-linux-desktop.sh$' || {
              echo "Linux archive is missing install-linux-desktop.sh" >&2
              exit 1
            }
            tar -tzf "$ARCHIVE" | grep -q 'QtWebEngineProcess' || {
              echo "Linux archive is missing QtWebEngineProcess" >&2
              exit 1
            }
          fi
          tar -tzf "$ARCHIVE" | head -5
          echo "Archive size: $(du -h "$ARCHIVE" | cut -f1)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}/*
          compression-level: 0
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List release files
        run: |
          ls -lah release-files/
          for file in release-files/*; do
            echo "$file ($(du -h "$file" | cut -f1))"
          done

      - name: Validate release files
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "Release tag must start with v, got: $RELEASE_TAG" >&2
              exit 1
              ;;
          esac

          required=(
            emex-windows-x64.zip
            emex-macos-intel.tar.gz
            emex-macos-arm64.tar.gz
            emex-linux-x64.tar.gz
          )

          for name in "${required[@]}"; do
            if [ ! -s "release-files/$name" ]; then
              echo "Missing release asset: $name" >&2
              exit 1
            fi
          done

      - name: Generate release notes
        run: |
          {
            echo "## eMeX $RELEASE_TAG"
            echo
            echo "Built automatically from commit \`$GITHUB_SHA\`."
            echo
            echo "### Downloads"
            for file in release-files/*; do
              size="$(du -h "$file" | cut -f1)"
              echo "- $(basename "$file") ($size)"
            done
          } > release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists, replacing its assets."
            gh release delete "$RELEASE_TAG" --yes
          fi

          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "eMeX $RELEASE_TAG" \
            --notes-file release-notes.md \
            release-files/*
